<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site para cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main>

        <div class="container border rounded-4 shadow-lg p-3 mb-5 bg-body-tertiary rounded" style="margin-top: 50px;">

        <form class="row g-3 needs-validation" novalidate>

            <div style="margin-top: 50px;">
                <h2 class="text-center ">Cadastro de Aluno</h2>
                <p class="text-center"> Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico.</p>
            </div>
            



            
    <div class="col-md-6">
        <label for="nome" class="form-label">Nome completo</label>
        <input type="text" class="form-control" id="nome">
    <div class="valid-feedback">
    </div>
  </div>

    <div class="col-md-6">
        <label for="cpf" class="form-label">CPF</label>
        <input type="text" class="form-control" id="cpf">
    <div class="valid-feedback">
    </div>
  </div>

   <div class="col-md-4">
        <label for="dataNascimento" class="form-label">Data de nascimento</label>
        <input type="date" class="form-control" id="dataNascimento">
    <div class="valid-feedback">
    </div>
  </div>

  <div class="col-md-4">
        <label for="telefone" class="form-label">Telefone</label>
        <input type="text" class="form-control" id="telefone">
    <div class="valid-feedback">
    </div>
  </div>

   <div class="col-md-4">
    <label for="email" class="form-label">Email</label>
    <div class="input-group has-validation">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="email" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
      </div>
    </div>
  </div>

  <div class="col-md-12">
    <label for="endereco" class="form-label">Endereço Completo</label>
    <input type="text" class="form-control" id="endereco" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="cidade" class="form-label">Cidade</label>
    <input type="text" class="form-control" id="cidade" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="estado" class="form-label">Estado</label>
    <input type="text" class="form-control" id="estado" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="cep" class="form-label">CEP</label>
    <input type="text" class="form-control" id="cep" required>
    <div class="invalid-feedback">
    </div>
  </div>
  
  <div class="col-md-6">
    <label for="curso" class="form-label">Curso</label>
    <input type="text" class="form-control" id="curso" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-6">
    <label for="matricula" class="form-label">Matrícula</label>
    <input type="text" class="form-control" id="matricula" required>
    <div class="invalid-feedback">
    </div>
  </div>

  
  <div class="col-md-6">
  <label for="senha" class="form-label">Senha</label>
    <input type="password" class="form-control" id="senha" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-6">
  <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
    <input type="password" class="form-control" id="confirmarSenha" required>
    <div class="invalid-feedback">
    </div>
  </div>


  <div class="d-grid gap-2" style="margin-bottom: 20px;">
    <button class="btn btn-primary" type="submit">Cadastrar Aluno</button>
  </div>
  </div>
</form>


    </main>
    
</body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="script.js"></script>
</html>
